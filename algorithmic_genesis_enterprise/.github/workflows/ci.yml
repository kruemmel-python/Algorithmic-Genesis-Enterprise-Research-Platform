name: ci

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake g++ libsqlite3-dev
      - name: Configure
        run: cmake -S . -B build -DAG_ENABLE_OPENCL=OFF -DAG_ENABLE_SQLITE=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Smoke
        run: ./build/ag_cli evolve --population 16 --generations 2 --seed 42
